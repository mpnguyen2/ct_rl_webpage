<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm overview for continuous-time actor-critic</title>
  <desc id="desc">A clean pipeline from irregular samples to time-aware critic target, single critic update, and CT-SAC or CT-TD3 policy improvement.</desc>

  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="1160" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1422"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="blue" x1="92" y1="172" x2="340" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="violet" x1="384" y1="172" x2="718" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="760" y1="172" x2="1114" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
    <marker id="arrBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrViolet" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#A78BFA"/>
    </marker>
    <marker id="arrGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#34D399"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="26" fill="#080D16"/>
  <rect x="34" y="28" width="1132" height="584" rx="28" fill="url(#bg)" stroke="#22314A"/>

  <g opacity="0.75" stroke="#1F2A3D" stroke-width="1.25">
    <path d="M74 560C156 522 244 520 326 560"/>
    <path d="M866 100C950 64 1044 72 1116 126"/>
    <ellipse cx="160" cy="106" rx="110" ry="44"/>
    <ellipse cx="1070" cy="554" rx="86" ry="34"/>
  </g>

  <!-- Section headers -->
  <g filter="url(#shadow)">
    <rect x="86" y="72" width="246" height="54" rx="18" fill="#0F172A" stroke="#23344F"/>
    <text x="209" y="106" text-anchor="middle" fill="#E8F2FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Irregular samples</text>

    <rect x="396" y="72" width="294" height="54" rx="18" fill="#0F172A" stroke="#2E2655"/>
    <text x="543" y="106" text-anchor="middle" fill="#F0E9FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Time-aware target</text>

    <rect x="758" y="72" width="356" height="54" rx="18" fill="#0F172A" stroke="#20483B"/>
    <text x="936" y="106" text-anchor="middle" fill="#EDFFF7" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Critic and actor</text>
  </g>

  <!-- Left block -->
  <g filter="url(#shadow)">
    <rect x="82" y="162" width="254" height="306" rx="28" fill="#0E1625" stroke="#25446A"/>
    <rect x="108" y="188" width="104" height="28" rx="14" fill="url(#blue)"/>
    <text x="160" y="207" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="700">buffer</text>

    <text x="112" y="252" fill="#DCEBFF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">(x, a, r, x′, u)</text>
    <text x="112" y="282" fill="#9DB8D8" font-size="15" font-family="Inter, Arial, sans-serif">irregular durations</text>

    <g stroke="#36557D" stroke-width="4" stroke-linecap="round">
      <line x1="114" y1="338" x2="304" y2="338"/>
      <line x1="114" y1="394" x2="304" y2="394"/>
    </g>
    <g fill="#E5F2FF">
      <circle cx="128" cy="338" r="7"/>
      <circle cx="160" cy="338" r="7"/>
      <circle cx="186" cy="338" r="7"/>
      <circle cx="246" cy="338" r="7"/>
      <circle cx="292" cy="338" r="7"/>

      <circle cx="128" cy="394" r="7"/>
      <circle cx="184" cy="394" r="7"/>
      <circle cx="208" cy="394" r="7"/>
      <circle cx="226" cy="394" r="7"/>
      <circle cx="290" cy="394" r="7"/>
    </g>

    <text x="112" y="440" fill="#CBE1FF" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">environment time: u</text>
  </g>

  <!-- Middle block -->
  <g filter="url(#shadow)">
    <rect x="392" y="162" width="300" height="306" rx="28" fill="#101625" stroke="#4D3787"/>
    <rect x="418" y="188" width="116" height="28" rx="14" fill="url(#violet)"/>
    <text x="476" y="207" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="700">target</text>

    <rect x="428" y="250" width="228" height="50" rx="16" fill="#141C31" stroke="#34456D"/>
    <text x="542" y="281" text-anchor="middle" fill="#EDE9FE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">(1 − τ) Qₖ</text>

    <rect x="428" y="316" width="228" height="50" rx="16" fill="#141C31" stroke="#34456D"/>
    <text x="542" y="347" text-anchor="middle" fill="#EDE9FE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">reward + soft value</text>

    <rect x="428" y="382" width="228" height="50" rx="16" fill="#141C31" stroke="#34456D"/>
    <text x="542" y="413" text-anchor="middle" fill="#EDE9FE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">time-scaled bootstrap</text>

    <text x="542" y="456" text-anchor="middle" fill="#CFC4F8" font-size="15" font-family="Inter, Arial, sans-serif">optimizer step: τ</text>
  </g>

  <!-- Right block -->
  <g filter="url(#shadow)">
    <rect x="748" y="162" width="372" height="306" rx="28" fill="#0F1824" stroke="#1F5C47"/>
    <rect x="776" y="188" width="98" height="28" rx="14" fill="url(#green)"/>
    <text x="825" y="207" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Inter, Arial, sans-serif" font-weight="700">update</text>

    <rect x="782" y="246" width="304" height="78" rx="22" fill="#13261D" stroke="#2E6B52"/>
    <text x="934" y="283" text-anchor="middle" fill="#ECFDF5" font-size="34" font-family="Georgia, Times New Roman, serif" font-weight="700">Q ≈ V + q</text>
    <text x="934" y="307" text-anchor="middle" fill="#BFE7D7" font-size="15" font-family="Inter, Arial, sans-serif">single critic</text>

    <rect x="782" y="354" width="136" height="56" rx="18" fill="#141E2D" stroke="#35507A"/>
    <text x="850" y="388" text-anchor="middle" fill="#DCEBFF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">CT-SAC</text>

    <rect x="942" y="354" width="136" height="56" rx="18" fill="#141E2D" stroke="#35507A"/>
    <text x="1010" y="388" text-anchor="middle" fill="#DCEBFF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">CT-TD3</text>

    <text x="930" y="444" text-anchor="middle" fill="#B6D6C8" font-size="15" font-family="Inter, Arial, sans-serif">optional Richardson correction</text>
  </g>

  <!-- External connectors only -->
  <path d="M336 315C358 315 366 315 392 315" stroke="#60A5FA" stroke-width="6" stroke-linecap="round" marker-end="url(#arrBlue)"/>
  <path d="M692 315C716 315 724 315 748 315" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" marker-end="url(#arrViolet)"/>

  <!-- bottom summary chips -->
  <g opacity="0.96">
    <rect x="146" y="518" width="220" height="42" rx="14" fill="#0F172A" stroke="#23344F"/>
    <text x="256" y="545" text-anchor="middle" fill="#CFE5FF" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">collect and replay</text>

    <rect x="486" y="518" width="232" height="42" rx="14" fill="#0F172A" stroke="#23344F"/>
    <text x="602" y="545" text-anchor="middle" fill="#EDE9FE" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">build time-aware target</text>

    <rect x="838" y="518" width="216" height="42" rx="14" fill="#0F172A" stroke="#23344F"/>
    <text x="946" y="545" text-anchor="middle" fill="#D1FAE5" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600">critic then actor</text>
  </g>
</svg>
