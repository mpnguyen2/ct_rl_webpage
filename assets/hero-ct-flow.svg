    <circle cx="941" cy="228" r="56" stroke="#2D5CA8" stroke-width="6" opacity="0.55"/>
    <path d="M892 224C898 184 934 160 970 170C1007 180 1028 215 1017 251" stroke="#8B5CF6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowV)"/>
    <path d="M990 235C982 274 948 297 912 289C877 282 854 251 862 215" stroke="#34D399" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowG)"/>
