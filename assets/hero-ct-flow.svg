<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Continuous-time reinforcement learning hero artwork</title>
  <desc id="desc">Abstract artwork showing irregular decision times feeding into local q estimation, Hamiltonian flow on capital V, and a single-critic continuous-time actor-critic method.</desc>

  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="1110" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 250) rotate(21) scale(320 220)">
      <stop stop-color="#3BA7FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3BA7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(665 230) rotate(-14) scale(300 220)">
      <stop stop-color="#8D6CFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8D6CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(885 470) rotate(11) scale(280 190)">
      <stop stop-color="#5BE39B" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5BE39B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineBlue" x1="145" y1="200" x2="590" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FC3FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="lineViolet" x1="535" y1="270" x2="820" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="lineGreen" x1="760" y1="356" x2="1024" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowB" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowV" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#A78BFA"/>
    </marker>
    <marker id="arrowG" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14Z" fill="#34D399"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="26" fill="#080D16"/>
  <rect x="38" y="36" width="1124" height="688" rx="28" fill="url(#bg)" stroke="rgba(255,255,255,0.10)"/>

