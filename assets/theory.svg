<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Minimal theory roadmap</title>
  <desc id="desc">A spacious visual roadmap from semigroup reference and flow iteration to value convergence, q-convergence, algorithm convergence, and random-time results.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>

    <linearGradient id="panel" x1="120" y1="90" x2="1160" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10192B"/>
      <stop offset="1" stop-color="#0E1626"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5BCBFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C1A6FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7EE7BE"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9C46B"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="820" rx="28" fill="url(#bg)"/>

  <!-- subtle background geometry -->
  <g opacity="0.25" stroke="#253246" stroke-width="1.2">
    <ellipse cx="182" cy="110" rx="132" ry="44"/>
    <ellipse cx="1080" cy="114" rx="146" ry="48"/>
    <ellipse cx="120" cy="700" rx="96" ry="32"/>
    <ellipse cx="1110" cy="706" rx="118" ry="36"/>
  </g>

  <!-- top engine -->
  <g filter="url(#shadow)">
    <rect x="110" y="86" width="1060" height="280" rx="32" fill="url(#panel)" stroke="#233146"/>
    <text x="640" y="138" text-anchor="middle" fill="#EEF4FF" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Theory roadmap</text>
    <text x="640" y="174" text-anchor="middle" fill="#AFC5E6" font-size="16" font-family="Inter, Arial, sans-serif">contraction reference → flow approximation → critic-level guarantees</text>

    <!-- left icon -->
    <g>
      <circle cx="280" cy="250" r="62" fill="#0F1C2D" stroke="#2D496E" stroke-width="2.5"/>
      <path d="M235 252C245 212 281 190 318 201C351 211 370 244 360 282" stroke="url(#blue)" stroke-width="7" stroke-linecap="round"/>
      <path d="M268 235L282 220L297 235" stroke="#E2F2FF" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="282" y1="221" x2="282" y2="269" stroke="#E2F2FF" stroke-width="3.3" stroke-linecap="round"/>
      <text x="280" y="334" text-anchor="middle" fill="#EAF4FF" font-size="21" font-family="Inter, Arial, sans-serif" font-weight="700">Semigroup</text>
    </g>

    <!-- center icon -->
    <g>
      <circle cx="640" cy="250" r="62" fill="#151731" stroke="#4A3B80" stroke-width="2.5"/>
      <circle cx="640" cy="250" r="27" fill="none" stroke="url(#violet)" stroke-width="3.8"/>
      <circle cx="640" cy="250" r="8" fill="#F2EAFF"/>
      <circle cx="640" cy="250" r="43" fill="none" stroke="#7358C7" stroke-width="1.8" stroke-dasharray="5 7" opacity="0.8"/>
      <text x="640" y="334" text-anchor="middle" fill="#F5F0FF" font-size="21" font-family="Inter, Arial, sans-serif" font-weight="700">Flow iteration</text>
    </g>

    <!-- right icon -->
    <g>
      <circle cx="1000" cy="250" r="62" fill="#0F201A" stroke="#2E6855" stroke-width="2.5"/>
      <rect x="968" y="218" width="64" height="56" rx="15" fill="none" stroke="url(#green)" stroke-width="3.5"/>
      <line x1="1000" y1="222" x2="1000" y2="270" stroke="#E8FFF2" stroke-width="2.4" opacity="0.75"/>
      <line x1="972" y1="246" x2="1028" y2="246" stroke="#E8FFF2" stroke-width="2.4" opacity="0.75"/>
      <text x="1000" y="334" text-anchor="middle" fill="#EDFFF5" font-size="21" font-family="Inter, Arial, sans-serif" font-weight="700">Single critic</text>
    </g>

    <!-- connectors -->
    <path d="M344 250H560" stroke="#4A678F" stroke-width="5" stroke-linecap="round"/>
    <path d="M704 250H920" stroke="#55627F" stroke-width="5" stroke-linecap="round"/>

    <!-- tiny accents -->
    <g opacity="0.85">
      <circle cx="413" cy="250" r="4" fill="#6ECFFF"/>
      <circle cx="520" cy="250" r="4" fill="#8CCBFF"/>
      <circle cx="772" cy="250" r="4" fill="#C5B3FF"/>
      <circle cx="880" cy="250" r="4" fill="#B9D0F2"/>
    </g>
  </g>

  <!-- branch trunk -->
  <g stroke="#42546E" stroke-width="4.4" stroke-linecap="round">
    <path d="M640 400V450"/>
    <path d="M640 450H330"/>
    <path d="M640 450H950"/>
    <path d="M330 450V490"/>
    <path d="M950 450V490"/>
    <path d="M330 620V650"/>
    <path d="M950 620V650"/>
  </g>

  <!-- lower cards -->
  <g filter="url(#shadow)">
    <rect x="130" y="500" width="400" height="120" rx="26" fill="#0F1828" stroke="#2B3C55"/>
    <circle cx="194" cy="560" r="26" fill="#11243A" stroke="url(#blue)" stroke-width="2.6"/>
    <path d="M179 560H209" stroke="#DFF2FF" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M194 545V575" stroke="#DFF2FF" stroke-width="3.4" stroke-linecap="round"/>
    <text x="244" y="552" fill="#F1F7FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Value convergence</text>
    <text x="244" y="582" fill="#AFC5E6" font-size="15" font-family="Inter, Arial, sans-serif">reference semigroup + local mismatch</text>

    <rect x="130" y="650" width="400" height="120" rx="26" fill="#0F1828" stroke="#2B3C55"/>
    <circle cx="194" cy="710" r="26" fill="#1B1833" stroke="url(#violet)" stroke-width="2.6"/>
    <path d="M182 720C189 708 201 700 209 690" stroke="#F1EAFF" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M181 700H208" stroke="#F1EAFF" stroke-width="3.4" stroke-linecap="round"/>
    <text x="244" y="702" fill="#F7F1FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">q-convergence</text>
    <text x="244" y="732" fill="#CDBEFF" font-size="15" font-family="Inter, Arial, sans-serif">finite-step and Richardson control</text>

    <rect x="750" y="500" width="400" height="120" rx="26" fill="#0F1828" stroke="#2B3C55"/>
    <circle cx="814" cy="560" r="26" fill="#11271F" stroke="url(#green)" stroke-width="2.6"/>
    <rect x="800" y="546" width="28" height="28" rx="7" fill="none" stroke="#E7FFF2" stroke-width="3.2"/>
    <text x="864" y="552" fill="#F1FFF7" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Algorithm convergence</text>
    <text x="864" y="582" fill="#BDEFD3" font-size="15" font-family="Inter, Arial, sans-serif">single-critic and statistical lift</text>

    <rect x="750" y="650" width="400" height="120" rx="26" fill="#0F1828" stroke="#2B3C55"/>
    <circle cx="814" cy="710" r="26" fill="#241B17" stroke="url(#amber)" stroke-width="2.6"/>
    <path d="M801 714C808 700 818 694 828 685" stroke="#FFF1D8" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M800 725H829" stroke="#FFF1D8" stroke-width="3.4" stroke-linecap="round"/>
    <text x="864" y="702" fill="#FFF8F0" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Random time + regret</text>
    <text x="864" y="732" fill="#F7D6A4" font-size="15" font-family="Inter, Arial, sans-serif">moment transfer and sample complexity</text>
  </g>
</svg>
